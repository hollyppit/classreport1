<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수업 메이킹 일지</title>
<link rel="preload" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/Cafe24Ohsquare.woff" as="font" type="font/woff" crossorigin>
<link rel="preload" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff" as="font" type="font/woff" crossorigin>
<link rel="preload" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Dongdong.woff" as="font" type="font/woff" crossorigin>
<link rel="preload" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Simplehae.woff" as="font" type="font/woff" crossorigin>
<link rel="preload" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Shiningstar.woff" as="font" type="font/woff" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

/* 카페24 폰트 개별 정의 (Noonnu CDN) */
@font-face {
    font-family: 'Cafe24Ohsquare';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/Cafe24Ohsquare.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: block;
}
@font-face {
    font-family: 'Cafe24Ssurround';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: block;
}
@font-face {
    font-family: 'Cafe24Dongdong';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Dongdong.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: block;
}
@font-face {
    font-family: 'Cafe24Simplehae';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Simplehae.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: block;
}
@font-face {
    font-family: 'Cafe24Shiningstar';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Shiningstar.woff') format('woff');
    font-weight: normal; font-style: normal; font-display: block;
}

:root {
  --bg: #fffbf0;
  --panel: #ffffff;
  --yellow: #ffe34e;
  --mint: #4dddbc;
  --coral: #ff6b6b;
  --lavender: #c9b8ff;
  --blue: #5b9fff;
  --ink: #1e1e2e;
  --mid: #6b6b8a;
  --light: #f0ecff;
  --border: #e8e4f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,227,78,0.18) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(77,221,188,0.15) 0%, transparent 40%),
    radial-gradient(circle at 60% 10%, rgba(201,184,255,0.2) 0%, transparent 35%);
  min-height: 100vh;
  padding: 36px 20px 60px;
}

/* 헤더 */
.app-header { text-align: center; margin-bottom: 32px; animation: fadeDown 0.6s ease both; }
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }

.header-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--yellow); color: var(--ink);
  font-weight: 900; font-size: 11px; letter-spacing: 2px;
  padding: 5px 14px; border-radius: 999px; margin-bottom: 10px;
  border: 2px solid var(--ink);
}
.app-header h1 {
  font-family: 'Gaegu', cursive; font-size: 34px;
  font-weight: 700; color: var(--ink);
}
.app-header p { font-size: 13px; color: var(--mid); margin-top: 4px; font-weight: 300; }

/* 레이아웃 */
.editor-wrap { display: flex; gap: 22px; max-width: 1120px; margin: 0 auto; align-items: flex-start; }

/* 입력 패널 */
.input-panel { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; animation: fadeUp 0.5s 0.1s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.card {
  background: var(--panel); border-radius: 20px; padding: 20px;
  border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--ink);
}
.card-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 900; letter-spacing: 1px;
  color: var(--ink); margin-bottom: 16px; text-transform: uppercase;
}
.card-title-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

label { display: block; font-size: 11px; font-weight: 700; color: var(--mid); margin-bottom: 5px; letter-spacing: 0.5px; }

input[type="text"], textarea {
  width: 100%; background: var(--light); border: 2px solid var(--border);
  border-radius: 12px; color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  padding: 9px 12px; margin-bottom: 10px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--lavender); box-shadow: 0 0 0 3px rgba(201,184,255,0.3);
}
textarea { resize: vertical; min-height: 60px; line-height: 1.6; }

/* 사진 업로드 */
.photo-card {
  background: var(--panel); border-radius: 16px; border: 2px dashed var(--border);
  padding: 12px 14px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.photo-card:last-of-type { margin-bottom: 0; }
.photo-card:hover { border-color: var(--mint); background: #f4fffb; transform: translateY(-2px); }
.photo-card input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%; margin: 0; padding: 0; border: none;
}
.photo-icon-wrap {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0; pointer-events: none; overflow: hidden;
}
img.thumb { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; flex-shrink: 0; border: 2px solid var(--border); }
.photo-info { pointer-events: none; }
.photo-info strong { display: block; font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.photo-info span { font-size: 11px; color: var(--mid); }

/* 버튼 */
.btn-primary {
  width: 100%; background: var(--ink); color: #fff;
  border: 2px solid var(--ink); border-radius: 14px; padding: 13px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  box-shadow: 3px 3px 0 rgba(30,30,46,0.25);
}
.btn-primary:hover { background: #2d2d44; }
.btn-primary:active { transform: scale(0.97); }

.btn-secondary {
  width: 100%; background: var(--yellow); color: var(--ink);
  border: 2px solid var(--ink); border-radius: 14px; padding: 11px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; margin-top: 8px;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 3px 3px 0 rgba(30,30,46,0.2);
}
.btn-secondary:hover { background: #ffd800; }
.btn-secondary:active { transform: scale(0.97); }

/* 미리보기 */
.preview-panel { flex: 1; min-width: 0; animation: fadeUp 0.5s 0.2s ease both; }
.preview-label { font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--mid); text-transform: uppercase; margin-bottom: 10px; padding-left: 4px; }
.preview-scroll {
  background: #e8e4f0; border-radius: 20px; padding: 20px;
  overflow: auto; max-height: 88vh; border: 2px solid var(--border);
}

/* ── A4 리포트 ── */
#report-page {
  --rpt-font: 'Cafe24Ohsquare';
  width: 794px; min-height: 1123px;
  background: #ffffff;
  margin: 0 auto; font-family: var(--rpt-font);
  position: relative; overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  border: 1px solid #eaeaea;
  border-radius: 0;
}

/* 리포트 헤더 */
.rpt-header { background: #ffffff; position: relative; border-bottom: 1px solid #eaeaea; }
.rpt-header-inner { position: relative; z-index: 2; padding: 40px 44px 30px; }

.rpt-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #111111; color: #ffffff;
  font-size: 10px; font-weight: 900; letter-spacing: 2.5px;
  padding: 6px 14px; border-radius: 4px; margin-bottom: 14px; text-transform: uppercase;
}
.rpt-title {
  font-family: var(--rpt-font); font-size: 38px; font-weight: 800;
  color: #111111; line-height: 1.1; margin-bottom: 4px;
}
.rpt-sub { font-size: 13px; color: #888888; font-weight: 400; }

/* 메타 바 */
.rpt-meta { display: flex; background: #ffffff; border-bottom: 1px solid #eaeaea; }
.rpt-meta-item { flex: 1; padding: 16px 20px; border-right: 1px solid #eaeaea; }
.rpt-meta-item:last-child { border-right: none; }
.rpt-meta-key { font-size: 9px; font-weight: 700; color: #999999; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
.rpt-meta-val { font-size: 15px; font-weight: 800; color: #111111; font-family: var(--rpt-font); }

/* 본문 */
.rpt-body { padding: 32px 44px 44px; display: flex; gap: 32px; align-items: stretch; }

.rpt-sec { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; margin-top: 22px; }
.rpt-sec:first-child { margin-top: 0; }
.rpt-sec-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; padding: 6px 12px;
  background: #f1f3f5; color: #495057; border-radius: 4px;
}
.rpt-sec-line { flex: 1; height: 1px; background: #eaeaea; }

/* 사진 그리드 */
.rpt-photos { display: grid; gap: 10px; }
.rpt-photos.cols-1 { grid-template-columns: 1fr; }
.rpt-photos.cols-2 { grid-template-columns: 1fr 1fr; }
.rpt-photos.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.rpt-photo-cell {
  border-radius: 8px; overflow: hidden; aspect-ratio: 16/9;
  position: relative; width: 100%;
  background: #ffffff;
  border: 1px solid #eaeaea;
}
.rpt-photo-cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
}
.rpt-photo-empty {
  width: 100%; height: 100%; background: var(--light);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; color: var(--border); font-size: 11px;
}
.rpt-photo-empty-icon { font-size: 26px; }

/* 비교 */
.rpt-compare { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
.rpt-compare-arrow { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.rpt-arrow-circle {
  width: 34px; height: 34px; background: var(--coral); color: white;
  border-radius: 50%; border: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; box-shadow: 2px 2px 0 var(--ink);
}
.rpt-arrow-label { font-size: 8px; font-weight: 900; letter-spacing: 1px; color: var(--coral); text-transform: uppercase; }

/* 코멘트 */
.rpt-comment { border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; position: relative; min-height: 80px; border: 1px solid #eaeaea; border-left-width: 4px; }
.rpt-comment-student { border-left-color: var(--yellow); background: #fafafa; }
.rpt-comment-teacher { border-left-color: var(--mint); background: #fafafa; }
.rpt-comment-who { font-size: 10px; font-weight: 700; color: #adb5bd; text-transform: uppercase; margin-bottom: 8px; }
.rpt-comment-student .rpt-comment-who { color: #868e96; }
.rpt-comment-teacher .rpt-comment-who { color: #868e96; }
.rpt-comment-sticker { display: none; }
.rpt-comment-text { font-size: 14px; color: #111111; line-height: 1.8; font-weight: 400; font-family: var(--rpt-font); }

/* 푸터 */
.rpt-footer { border-top: 1px solid #eaeaea; margin: 0 44px; padding: 24px 0; display: flex; align-items: center; justify-content: space-between; }
.rpt-footer-left { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #111111; }
.rpt-footer-dot { width: 6px; height: 6px; border-radius: 50%; background: #111111; }
.rpt-footer-right { font-size: 11px; color: #999999; font-weight: 400; font-family: var(--rpt-font); }

/* 빈 상태 */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px; color: var(--mid); font-size: 13px; gap: 10px; }
.empty-state-icon { font-size: 48px; animation: bounce 1.5s infinite ease-in-out; }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

/* 폰트 탭 */
.font-tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.font-tab {
  flex: 1 1 calc(25% - 8px); min-width: 60px; padding: 8px 4px; background: white; color: var(--ink);
  border: 2px solid var(--ink); border-radius: 12px;
  font-size: 11px; font-weight: 800; cursor: pointer;
  transition: all 0.2s; box-shadow: 2px 2px 0 var(--ink);
  text-align: center;
}
.font-tab:hover { transform: translateY(-2px); }
.font-tab.active { background: var(--ink) !important; color: white !important; transform: none; box-shadow: none; }

/* 인쇄 */
@media print {
  @page { size: A4 portrait; margin: 8mm; }
  
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    background: white !important;
  }
  
  body > *:not(#report-page) {
    display: none !important;
  }
  
  #report-page {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 794px !important;
    height: auto !important;
    overflow: visible !important;
    box-shadow: none !important;
    border: none !important;
    border-radius: 0 !important;
    background: white !important;
    zoom: 0.85;
  }
}
@media (max-width: 900px) {
  .editor-wrap { flex-direction: column; }
  .input-panel { width: 100%; }
  #report-page { width: 100%; min-height: auto; }
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(30,30,46,0.5);
  backdrop-filter: blur(4px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-content {
  width: 90%; max-width: 450px; background: var(--panel);
  border: 2px solid var(--ink); border-radius: 20px;
  box-shadow: 8px 8px 0 var(--ink); padding: 24px;
  transform: translateY(20px); transition: transform 0.3s;
}
.modal-overlay.active .modal-content { transform: translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-header h2 { font-family: 'Gaegu', cursive; font-size: 24px; color: var(--ink); }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--mid); line-height: 1; }
.modal-body label { margin-top: 12px; display: block; }
.modal-loading { text-align: center; padding: 40px 0; display: none; }
.modal-loading-icon { font-size: 48px; margin-bottom: 16px; animation: bounce 1s infinite ease-in-out; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-badge">✏️ ART CLASS</div>
  <h1>수업 메이킹 일지 ✨</h1>
  <p>사진이랑 이름만 넣으면 리포트 완성! 인쇄해서 바로 드릴 수 있어요 🎨</p>
</div>

<div class="editor-wrap">
  <div class="input-panel">

    <div class="card">
      <div class="card-title">
        <div class="card-title-dot" style="background:var(--coral)"></div>기본 정보
      </div>
      <label>프로젝트 / 수업 이름</label>
      <input type="text" id="project-name" placeholder="예: 나만의 웹툰 만들기" oninput="syncPreview()">
      <label>학생 이름</label>
      <input type="text" id="student-name" placeholder="예: 김지유" oninput="syncPreview()">
      <label>회차</label>
      <input type="text" id="session-info" placeholder="예: 3회차 / 8회차" oninput="syncPreview()">
      <label>날짜</label>
      <input type="text" id="report-date" placeholder="예: 2025년 8월 5일" oninput="syncPreview()">
      <label>담당 선생님 (선택)</label>
      <input type="text" id="teacher-name" placeholder="예: 백진우 선생님" oninput="syncPreview()">
    </div>

    <div class="card">
      <div class="card-title">
        <div class="card-title-dot" style="background:var(--mint)"></div>사진 업로드
      </div>
      <div class="photo-card" id="card-storyboard">
        <input type="file" accept="image/*" onchange="handlePhoto(this,'storyboard')">
        <div id="icon-storyboard" class="photo-icon-wrap" style="background:#fff9e6;">✏️</div>
        <div class="photo-info"><strong>원본</strong><span>손 스케치 또는 기획 사진</span></div>
      </div>
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <button class="btn-secondary" style="flex:1; margin-top:0; font-size:11px; padding:8px;" onclick="openProfileModal()">✨ AI로 그림 만들기</button>
        <button id="btn-qualup" class="btn-secondary" style="flex:1; margin-top:0; font-size:11px; padding:8px; opacity:0.5;" onclick="imagineAI(this, 'upscale')" disabled>🎨 AI로 퀄업하기</button>
      </div>
      <div class="photo-card">
        <input type="file" accept="image/*" onchange="handlePhoto(this,'process')">
        <div id="icon-process" class="photo-icon-wrap" style="background:#edfff9;">🎨</div>
        <div class="photo-info"><strong>수업 중간 모습</strong><span>작업 과정 또는 수업 장면</span></div>
      </div>
      <div class="photo-card" style="margin-bottom:0;">
        <input type="file" accept="image/*" onchange="handlePhoto(this,'final')">
        <div id="icon-final" class="photo-icon-wrap" style="background:#f0ecff;">⭐</div>
        <div class="photo-info"><strong>최종 완성본</strong><span>결과물 사진</span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="justify-content: space-between;">
        <div style="display:flex; align-items:center; gap:8px;">
          <div class="card-title-dot" style="background:var(--lavender)"></div>코멘트 (선택)
        </div>
        <button class="btn-ai" onclick="generateAIComment(this)" style="background:linear-gradient(135deg,#c9b8ff,#9f7fff); color:#fff; border:none; padding:4px 10px; border-radius:12px; font-size:10px; font-weight:900; cursor:pointer; box-shadow: 2px 2px 0 rgba(30,30,46,0.15); transition: transform 0.1s;">✨ AI 자동 생성</button>
      </div>
      <label>수업 활동 내용</label>
      <textarea id="student-comment" placeholder="예: 첫 수업으로 구도 잡기 연습과 다양한 선 쓰기를 진행했습니다." oninput="syncPreview()"></textarea>
      <label>선생님 코멘트</label>
      <textarea id="teacher-comment" placeholder="예: 색감 선택이 굉장히 과감하고 독창적이었습니다." oninput="syncPreview()"></textarea>
    </div>

    <button id="main-generate-btn" class="btn-primary" onclick="generateAIReport(this)">리포트 생성하기 🎉</button>
    <button class="btn-secondary" onclick="downloadReport()">⬇ PDF로 저장하기</button>
    <button class="btn-secondary" onclick="exportWord()" style="margin-top:8px; background:#fff; border-color:var(--border);">📝 Word로 저장하기</button>
  </div>

  <div class="preview-panel">
    <div class="preview-label">미리보기</div>
    <div class="font-tabs">
      <button class="font-tab" onclick="changeReportFont('\'Noto Sans KR\', sans-serif', this)">고딕</button>
      <button class="font-tab" onclick="changeReportFont('\'Gaegu\', cursive', this)">손글씨</button>
      <button class="font-tab" onclick="changeReportFont('\'Nanum Myeongjo\', serif', this)">명조</button>
      <button class="font-tab active" onclick="changeReportFont('\'Cafe24Ohsquare\'', this)">단정해</button>
      <button class="font-tab" onclick="changeReportFont('\'Cafe24Ssurround\'', this)">쑥쑥</button>
      <button class="font-tab" onclick="changeReportFont('\'Cafe24Dongdong\'', this)">동동</button>
      <button class="font-tab" onclick="changeReportFont('\'Cafe24Simplehae\'', this)">심플해</button>
      <button class="font-tab" onclick="changeReportFont('\'Cafe24Shiningstar\'', this)">빛나는별</button>
    </div>
    <div class="preview-scroll">
      <div id="report-page">
        <div class="empty-state">
          <div class="empty-state-icon">🖼️</div>
          <span>왼쪽에서 정보를 입력하면</span>
          <span>리포트가 여기에 나타나요!</span>
        </div>
      </div>
    </div>

</div>

<div id="profile-modal" class="modal-overlay">
  <div class="modal-content">
    <div id="modal-form-view">
      <div class="modal-header">
        <h2>✨ 아이 성향 입력</h2>
        <button class="modal-close" onclick="closeProfileModal()">×</button>
      </div>
      <div class="modal-body">
        <p style="font-size:12px; color:var(--mid); margin-bottom:16px;">아이의 관심사를 알려주시면 Claude가 분석하고 Gemini가 그림을 그려요!</p>
        <label>좋아하는 캐릭터/만화/게임</label>
        <input type="text" id="p-favorite" placeholder="예: 피카츄, 마인크래프트">
        <label>취미나 좋아하는 활동</label>
        <input type="text" id="p-hobby" placeholder="예: 축구, 종이접기">
        <label>장래희망</label>
        <input type="text" id="p-dream" placeholder="예: 과학자, 화가">
        <label>기타 특징</label>
        <input type="text" id="p-etc" placeholder="예: 활발함, 분홍색 좋아함, 강아지 키움">

      <div class="modal-loading-icon">🎨</div>
      <p style="font-weight:700; color:var(--ink); font-size:16px;">이 아이의 그림을 상상하는 중... ✨</p>
      <p style="font-size:12px; color:var(--mid); margin-top:10px;">Claude와 Gemini가 협업하고 있어요!</p>
    </div>
  </div>
</div>

<script>
const photos = { storyboard: null, process: null, final: null };
let currentFont = 'Cafe24Ohsquare'; // 현재 선택된 폰트

function openProfileModal() {
  document.getElementById('profile-modal').classList.add('active');
  document.getElementById('modal-form-view').style.display = 'block';
  document.getElementById('modal-loading-view').style.display = 'none';
}

function closeProfileModal() {
  document.getElementById('profile-modal').classList.remove('active');
}

async function generateFromProfile() {
  const formView = document.getElementById('modal-form-view');
  const loadingView = document.getElementById('modal-loading-view');
  
  const profile = {
    favorite: document.getElementById('p-favorite').value,
    hobby: document.getElementById('p-hobby').value,
    dream: document.getElementById('p-dream').value,
    etc: document.getElementById('p-etc').value
  };

  formView.style.display = 'none';
  loadingView.style.display = 'block';

  try {
    // 1단계: Claude(/api/generate)로 성향 분석 및 영문 프롬프트 생성
    const genRes = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'analyze_profile', profile: profile })
    });
    if (!genRes.ok) throw new Error('성향 분석 실패');
    const { prompt: rawPrompt } = await genRes.json();

    // 2단계: 프롬프트 조합 (사용자 요청 스타일 지시어 추가)
    const finalPrompt = `${rawPrompt}, drawn by a Korean elementary school child, crayon or colored pencil style, slightly crooked and cute lines, on white paper, warm and cheerful`;

    // 3단계: Gemini(/api/imagine)로 이미지 생성
    const imgRes = await fetch('/api/imagine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'generate', prompt: finalPrompt })
    });
    const data = await imgRes.json();
    if (!imgRes.ok) throw new Error(data.error || '이미지 생성 실패');

    if (data.image) {
      updatePhoto('storyboard', data.image);
      closeProfileModal();
    }
  } catch (e) {
    console.error(e);
    alert('그림 생성 중 오류가 발생했습니다: ' + e.message);
    formView.style.display = 'block';
    loadingView.style.display = 'none';
  }
}

function handlePhoto(input, key) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    updatePhoto(key, e.target.result);
  };
  reader.readAsDataURL(file);
}

function updatePhoto(key, dataUrl) {
  photos[key] = dataUrl;
  const el = document.getElementById('icon-' + key);
  if (el) {
    el.outerHTML = `<img id="icon-${key}" class="thumb" src="${dataUrl}" alt="">`;
  }
  if (key === 'storyboard') {
    const qualBtn = document.getElementById('btn-qualup');
    qualBtn.disabled = false;
    qualBtn.style.opacity = "1";
  }
  syncPreview();
}

async function imagineAI(btn, type) {
  const originalText = btn.innerHTML;
  btn.innerHTML = "그림 그리는 중... 🎨";
  btn.disabled = true;

  try {
    const studentComment = document.getElementById('student-comment').value;

    if (type === 'generate' && !studentComment) {
      alert('그림 생성을 위해 "수업 활동 내용"을 먼저 적어주세요! (아이의 성향을 분석하기 위해 필요해요)');
      return;
    }

    if (type === 'upscale' && !photos.storyboard) {
      alert('퀄업할 원본 이미지를 먼저 업로드하거나 생성해 주세요!');
      return;
    }

    const body = { 
      type: type, 
      studentComment: studentComment,
      image: (type === 'upscale') ? photos.storyboard : null
    };

    const res = await fetch('/api/imagine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI 그림 처리 중 오류가 발생했습니다.');
    
    if (data.image) {
      // 퀄업이든 생성이든 '원본(storyboard)' 자리에 채움
      updatePhoto('storyboard', data.image);
    }
  } catch (e) {
    console.error(e);
    alert('그림 작업에 실패했습니다: ' + e.message);
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function syncPreview() { generateReport(); }

async function generateAIReport(btn) {
  const originalText = btn.innerHTML;
  btn.innerHTML = "AI가 리포트를 작성 중이에요... ✨";
  btn.disabled = true;

  try {
    const req = {
      projectName: document.getElementById('project-name').value,
      studentName: document.getElementById('student-name').value,
      sessionInfo: document.getElementById('session-info').value,
      reportDate:  document.getElementById('report-date').value,
      teacherName: document.getElementById('teacher-name').value,
      student_comment: document.getElementById('student-comment').value,
      teacher_comment: document.getElementById('teacher-comment').value,
      storyboardImg: photos.storyboard,
      processImg: photos.process,
      finalImg: photos.final
    };

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(req)
    });

    if (!res.ok) throw new Error('AI 분석에 실패했습니다.');
    
    const data = await res.json();
    if (data.projectName) document.getElementById('project-name').value = data.projectName;
    if (data.studentName) document.getElementById('student-name').value = data.studentName;
    if (data.sessionInfo) document.getElementById('session-info').value = data.sessionInfo;
    if (data.reportDate)  document.getElementById('report-date').value = data.reportDate;
    if (data.teacherName) document.getElementById('teacher-name').value = data.teacherName;
    if (data.student_comment) document.getElementById('student-comment').value = data.student_comment;
    if (data.teacher_comment) document.getElementById('teacher-comment').value = data.teacher_comment;
    
    generateReport();
  } catch (e) {
    console.error(e);
    alert('리포트 생성 중 오류가 발생했습니다. (환경 변수 설정을 확인해 주세요)');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

async function generateAIComment(btn) {
  const originalText = btn.innerHTML;
  btn.innerHTML = "✨ 다듬는 중...";
  btn.disabled = true;

  try {
    const req = {
      mode: 'refine_comments',
      studentName: document.getElementById('student-name').value,
      projectName: document.getElementById('project-name').value,
      studentComment: document.getElementById('student-comment').value,
      teacherComment: document.getElementById('teacher-comment').value
    };

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(req)
    });

    if (!res.ok) throw new Error('AI 분석에 실패했습니다.');
    
    const data = await res.json();
    if (data.studentComment) document.getElementById('student-comment').value = data.studentComment;
    if (data.teacherComment) document.getElementById('teacher-comment').value = data.teacherComment;
    
    syncPreview();
  } catch (e) {
    console.error(e);
    alert('코멘트 정제 중 오류가 발생했습니다.');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function generateReport() {
  const page = document.getElementById('report-page');
  if (currentFont) page.style.fontFamily = currentFont;

  const projectName = document.getElementById('project-name').value || '수업 메이킹 일지';
  const studentName = document.getElementById('student-name').value || '학생';
  const sessionInfo = document.getElementById('session-info').value || '-';
  const reportDate  = document.getElementById('report-date').value  || '-';
  const teacherName = document.getElementById('teacher-name').value;
  const studentCmt  = document.getElementById('student-comment').value;
  const teacherCmt  = document.getElementById('teacher-comment').value;

  // 좌측 60% (사진 세로 나열)
  const hasStoryboard = !!photos.storyboard;
  const hasProcess = !!photos.process;
  const hasFinal = !!photos.final;
  const hasAnyPhoto = hasStoryboard || hasProcess || hasFinal;

  let photosHTML = '';
  if (hasAnyPhoto) {
    photosHTML = `<div style="width: 60%; display: flex; flex-direction: column; gap: 14px;">`;
    
    // 1. 작업 기록 (원본 / 최종) 비교 섹션
    if (hasStoryboard || hasFinal) {
      photosHTML += `
        <div class="rpt-sec" style="margin-top:0;">
          <div class="rpt-sec-pill" style="color:#ff6b6b;border-color:#ff6b6b;">🖼️ 작업 기록</div>
          <div class="rpt-sec-line" style="background:#ffd6d6;"></div>
        </div>
      `;
      // 두 장 다 있으면 나란히 또는 세로? 요청은 '둘 중 하나만 있으면 전체 너비'
      // 여기서는 세로로 나열하되 있으면 보여주는 방식으로 처리 (기존 구조)
      if (hasStoryboard) {
        photosHTML += `<div class="rpt-photo-cell"><img src="${photos.storyboard}"></div>`;
      }
      if (hasFinal) {
        photosHTML += `<div class="rpt-photo-cell"><img src="${photos.final}"></div>`;
      }
    }

    // 2. 수업 과정 섹션
    if (hasProcess) {
      photosHTML += `
        <div class="rpt-sec">
          <div class="rpt-sec-pill" style="color:#4dddbc;border-color:#4dddbc;">🎨 수업 과정</div>
          <div class="rpt-sec-line" style="background:#edfff9;"></div>
        </div>
        <div class="rpt-photo-cell"><img src="${photos.process}"></div>
      `;
    }

    photosHTML += `</div>`;
  }

  // 우측 40% (코멘트)
  // 우측 코멘트 (사진 유무에 따라 너비 100% 또는 40%)
  const commentWidth = hasAnyPhoto ? '40%' : '100%';
  let commentsHTML = `<div style="width: ${commentWidth}; display: flex; flex-direction: column; gap: 10px;">`;
  commentsHTML += `
    <div class="rpt-sec" style="margin-top:0;">
      <div class="rpt-sec-pill" style="color:#8b6fff;border-color:#c9b8ff;">💬 수업 코멘트</div>
      <div class="rpt-sec-line" style="background:#e8e0ff;"></div>
    </div>`;
    
  if (studentCmt || teacherCmt) {
    if (studentCmt) commentsHTML += `
      <div class="rpt-comment rpt-comment-student">
        <div class="rpt-comment-sticker">🌟</div>
        <div class="rpt-comment-who">수업 활동 내용 · ${studentName}</div>
        <div class="rpt-comment-text">${studentCmt}</div>
      </div>`;
    if (teacherCmt) commentsHTML += `
      <div class="rpt-comment rpt-comment-teacher">
        <div class="rpt-comment-sticker">✍️</div>
        <div class="rpt-comment-who">선생님 코멘트${teacherName ? ' · ' + teacherName : ''}</div>
        <div class="rpt-comment-text">${teacherCmt}</div>
      </div>`;
  } else {
    commentsHTML += `<div style="font-size:12px; color:var(--mid); padding:20px; text-align:center; background:#f0ecff; border-radius:14px; border:2px dashed #c9b8ff;">코멘트가 작성되지 않았습니다.</div>`;
  }
  commentsHTML += `</div>`;

  const metaItems = [
    {key:'학생', val:studentName},
    {key:'회차', val:sessionInfo},
    {key:'날짜', val:reportDate},
  ];
  if (teacherName) metaItems.push({key:'담당', val:teacherName});

  document.getElementById('report-page').innerHTML = `
    <div class="rpt-header">
      <div class="rpt-header-inner">
        <div class="rpt-badge">🎨 ART CLASS · MAKING REPORT</div>
        <div class="rpt-title" style="font-family: inherit">${projectName}</div>
      </div>
    </div>
    <div class="rpt-meta">
      ${metaItems.map(m=>`<div class="rpt-meta-item"><div class="rpt-meta-key">${m.key}</div><div class="rpt-meta-val" style="font-family: inherit">${m.val}</div></div>`).join('')}
    </div>
    <div class="rpt-body" style="font-family: inherit">
      ${photosHTML}
      ${commentsHTML}
    </div>
    <div class="rpt-footer">
      <div class="rpt-footer-left"><div class="rpt-footer-dot"></div>Making Report</div>
      <div class="rpt-footer-right" style="font-family: inherit">${projectName} · ${studentName}</div>
    </div>`;
}



function downloadReport() {
  generateReport();
  setTimeout(() => {
    const page = document.getElementById('report-page');
    const originalParent = page.parentNode;
    const placeholder = document.createElement('div');
    
    // 원래 위치에 placeholder 삽입
    originalParent.insertBefore(placeholder, page);
    
    // body 직속으로 이동
    document.body.appendChild(page);
    
    // 스타일 초기화 및 고정
    page.style.cssText = `
      position: fixed;
      top: 0;
      left: 0;
      width: 794px;
      height: auto;
      overflow: visible;
      z-index: 999999;
      background: white;
      transform: none;
    `;
    
    window.print();
    
    setTimeout(() => {
      // 원위치 복원
      page.style.cssText = '';
      originalParent.insertBefore(page, placeholder);
      placeholder.remove();
    }, 1500);
  }, 400);
}

function changeReportFont(fontName, btn) {
  currentFont = fontName;
  const page = document.getElementById('report-page');
  page.style.fontFamily = currentFont;
  
  // 탭 활성화 상태 변경
  document.querySelectorAll('.font-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  
  syncPreview();
}

function base64ToArrayBuffer(base64) {
  const base64Data = base64.split(',')[1];
  const binaryString = atob(base64Data);
  const bytes = new Uint8Array(binaryString.length);
  for (let i = 0; i < binaryString.length; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  return bytes.buffer;
}

function getImageDimensions(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
    img.onerror = () => resolve({ width: 1, height: 1 });
    img.src = dataUrl;
  });
}

async function exportWord() {
  const { Document, Paragraph, TextRun, ImageRun, HeadingLevel, AlignmentType, Packer, Table, TableRow, TableCell, WidthType, BorderStyle } = window.docx;
  
  const projectName = document.getElementById('project-name').value || '수업 메이킹 일지';
  const studentName = document.getElementById('student-name').value || '학생';
  const sessionInfo = document.getElementById('session-info').value || '-';
  const reportDate  = document.getElementById('report-date').value  || '-';
  const teacherName = document.getElementById('teacher-name').value || '-';
  const studentCmt  = document.getElementById('student-comment').value;
  const teacherCmt  = document.getElementById('teacher-comment').value;

  const sections = [];

  // 제목 및 부제
  sections.push(new Paragraph({
    children: [new TextRun({ text: projectName, bold: true, size: 28 })],
    heading: HeadingLevel.HEADING_1,
    alignment: AlignmentType.CENTER,
    spacing: { after: 100 },
  }));
  sections.push(new Paragraph({
    children: [new TextRun({ text: "ART CLASS · MAKING REPORT", size: 14, color: "6b6b8a" })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 150 },
  }));

  // 정보 표 (상단 배치)
  sections.push(new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({
        children: [
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "학생", bold: true, size: 16 })] })], shading: { fill: "f5f0e8" } }),
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: studentName, size: 16 })] })] }),
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "회차", bold: true, size: 16 })] })], shading: { fill: "f5f0e8" } }),
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: sessionInfo, size: 16 })] })] }),
        ]
      }),
      new TableRow({
        children: [
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "날짜", bold: true, size: 16 })] })], shading: { fill: "f5f0e8" } }),
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: reportDate, size: 16 })] })] }),
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "담당", bold: true, size: 16 })] })], shading: { fill: "f5f0e8" } }),
          new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: teacherName, size: 16 })] })] }),
        ]
      }),
    ],
    spacing: { after: 200 },
  }));

  // 2단 레이아웃을 위한 구성 요소 수집
  const photoChildren = [];
  const commentChildren = [];

  // 1. 사진들 수집
  const photoKeys = [
    { key: 'storyboard', label: '🖼️ 작업 기록 (원본/기획)' },
    { key: 'final', label: '⭐ 작업 기록 (최종 완성본)' },
    { key: 'process', label: '🎨 수업 과정' }
  ];
  
  const activePhotos = photoKeys.filter(item => photos[item.key]);
  const photoCount = activePhotos.length;
  
  // 크기 계산 로직
  const maxWidth = 240; 
  const maxHeight = photoCount > 0 ? (Math.floor(720 / photoCount) - 10) : 720;

  for (const item of activePhotos) {
    photoChildren.push(new Paragraph({
      children: [new TextRun({ text: item.label, bold: true, size: 14, color: "111111" })],
      spacing: { before: 100, after: 50 },
    }));
    try {
      const dataUrl = photos[item.key];
      const dims = await getImageDimensions(dataUrl);
      const ratio = dims.height / dims.width || 1;

      let finalWidth, finalHeight;
      if (ratio > maxHeight / maxWidth) {
        // 세로가 더 긴 경우: 높이 기준
        finalHeight = maxHeight;
        finalWidth = Math.round(maxHeight / ratio);
      } else {
        // 가로가 더 긴 경우: 너비 기준
        finalWidth = maxWidth;
        finalHeight = Math.round(maxWidth * ratio);
      }

      const buffer = base64ToArrayBuffer(dataUrl);
      photoChildren.push(new Paragraph({
        children: [
          new ImageRun({
            data: buffer,
            transformation: { width: finalWidth, height: finalHeight },
          }),
        ],
        alignment: AlignmentType.CENTER,
        spacing: { after: 100 },
      }));
    } catch (e) {
      console.error("Image processing failed", e);
    }
  }

  // 2. 코멘트들 수집
  if (studentCmt) {
    commentChildren.push(new Paragraph({
      children: [new TextRun({ text: "💬 수업 활동 내용", bold: true, size: 16, color: "8b6fff" })],
      spacing: { before: 100, after: 50 },
    }));
    commentChildren.push(new Paragraph({
      children: [new TextRun({ text: studentCmt, size: 16 })],
      spacing: { after: 100 },
    }));
  }

  if (teacherCmt) {
    commentChildren.push(new Paragraph({
      children: [new TextRun({ text: "✍️ 선생님 코멘트", bold: true, size: 16, color: "4dddbc" })],
      spacing: { before: 100, after: 50 },
    }));
    commentChildren.push(new Paragraph({
      children: [new TextRun({ text: teacherCmt, size: 16 })],
      spacing: { after: 100 },
    }));
  }

  // 2단 표 생성
  sections.push(new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    borders: {
      top: { style: BorderStyle.NONE },
      bottom: { style: BorderStyle.NONE },
      left: { style: BorderStyle.NONE },
      right: { style: BorderStyle.NONE },
      insideH: { style: BorderStyle.NONE },
      insideV: { style: BorderStyle.NONE }
    },
    rows: [
      new TableRow({
        children: [
          new TableCell({
            width: { size: 55, type: WidthType.PERCENTAGE },
            children: photoChildren,
            verticalAlign: AlignmentType.TOP
          }),
          new TableCell({
            width: { size: 45, type: WidthType.PERCENTAGE },
            children: commentChildren,
            verticalAlign: AlignmentType.TOP
          })
        ]
      })
    ]
  }));

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 12240, height: 15840 }, // A4
          margin: { top: 500, right: 500, bottom: 500, left: 500 } 
        }
      },
      children: sections,
    }],
  });

  Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${projectName}_${studentName}_메이킹일지.docx`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

generateReport();
</script>
</body>
</html>
